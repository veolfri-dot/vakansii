version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: jobs
      POSTGRES_PASSWORD: jobs_password
      POSTGRES_DB: jobs_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs -d jobs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DB_URL: postgresql+asyncpg://jobs:jobs_password@db:5432/jobs_db
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python bot/main.py

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DB_URL: postgresql+asyncpg://jobs:jobs_password@db:5432/jobs_db
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python worker.py

  web:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://jobs:jobs_password@db:5432/jobs_db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

  ngrok:
    image: wernight/ngrok
    env_file: .env
    environment:
      NGROK_PORT: nginx:80
    ports:
      - "4040:4040"
    depends_on:
      - nginx

volumes:
  pgdata:
